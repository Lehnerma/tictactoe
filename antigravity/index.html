<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tic Tac Toe</h1>
            <p class="subtitle">Ein moderner Klassiker</p>
        </header>

        <section class="setup-section">
            <div class="player-inputs">
                <div class="input-group">
                    <label for="player1">Spieler 1 (X)</label>
                    <input type="text" id="player1" placeholder="Name eingeben..." value="Spieler 1">
                </div>
                <div class="input-group">
                    <label for="player2">Spieler 2 (O)</label>
                    <input type="text" id="player2" placeholder="Name eingeben..." value="Spieler 2">
                </div>
            </div>
        </section>

        <section class="scoreboard">
            <div class="score-card player1-card active">
                <span class="player-name" id="display-p1">Spieler 1</span>
                <span class="score" id="score-p1">0</span>
            </div>
            <div class="score-card player2-card">
                <span class="player-name" id="display-p2">Spieler 2</span>
                <span class="score" id="score-p2">0</span>
            </div>
        </section>

        <main class="game-container">
            <div id="status" class="status-message">Spieler 1 ist am Zug</div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </main>

        <footer>
            <button id="reset-btn" class="btn btn-primary">Spiel zurücksetzen</button>
            <button id="reset-scores-btn" class="btn btn-secondary">Spielstand löschen</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
